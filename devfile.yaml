schemaVersion: 2.2.2

metadata:
  name: gengenie-workspace

projects:
  - name: gengenie-backend
    git:
      remotes:
        origin: https://github.com/sprabakkar/gengenie-backend.git

  - name: gengenie-frontend
    git:
      remotes:
        origin: https://github.com/sprabakkar/gengenie-frontend.git

components:
  - name: tools
    container:
      image: quay.io/devspaces/udi-rhel8
      memoryLimit: 4Gi
      mountSources: true

      env:
        # ----------------------------
        # FastAPI Backend
        # ----------------------------
        - name: MISTRAL_API_URL
          value: https://api.mistral.ai/v1/chat/completions

        - name: MISTRAL_API_KEY
          value: 8yYtQLAb5Bu7leRaXJrQHlqrcJ4Avj82

        - name: MAX_FILE_SIZE_BYTES
          value: "10485760"

        - name: LLM_TIMEOUT
          value: "120"

        - name: LLM_RETRIES
          value: "4"

        - name: LLM_RETRY_DELAY
          value: "3.0"

        - name: LOG_LEVEL
          value: INFO

        # ----------------------------
        # React Frontend
        # ----------------------------
        - name: VITE_API_URL
          value: https://k-prabakar-singaram-gengenie-workspace-backend.apps.rm3.7wse.p1.openshiftapps.com

      endpoints:
        - name: frontend
          targetPort: 5173
          exposure: public
          secure: true
          protocol: https
        - name: backend
          targetPort: 5000
          exposure: public
          secure: true
          protocol: https

commands:

  - id: install-backend
    exec:
      component: tools
      workingDir: /projects/gengenie-backend
      commandLine: |
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt
      group:
        kind: build

  - id: install-frontend
    exec:
      component: tools
      workingDir: /projects/gengenie-frontend
      commandLine: |
        source ~/.nvm/nvm.sh
        nvm install 20.19
        nvm use 20.19
        npm install
      group:
        kind: build

  - id: run-backend
    exec:
      component: tools
      workingDir: /projects/gengenie-backend
      commandLine: |
        uvicorn app:app \
          --host 0.0.0.0 \
          --port 5000 \
          --reload
      group:
        kind: run

  - id: run-frontend
    exec:
      component: tools
      workingDir: /projects/gengenie-frontend
      commandLine: |
        source ~/.nvm/nvm.sh
        nvm use 20.19
        npm run dev -- --host 0.0.0.0 --port 5173
      group:
        kind: run
        isDefault: true
